name: Image to 3D Model Generation

on: 
  workflow_dispatch:
    inputs:
      image_path:
        description: 'Path to the input image file (e.g., images/mannequin.png)'
        required: true
        default: 'images/mannequin.png'
        type: string

jobs:
  generate-3d-model:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run AI-based 3D model generation
        id: generate_model
        run: |
          mkdir -p output
          python scripts/generate_3d_model.py ${{ github.event.inputs.image_path }} output/generated_model.obj
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Set up Blender
        run: |
          sudo apt-get update
          sudo apt-get install -y blender python3-numpy

      - name: Process 3D model in Blender
        run: |
          blender --background --python scripts/process_blender_model.py -- output/generated_model.obj output/final_model.glb

      - name: Commit and push 3D model
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/final_model.glb
          git commit -m "Add generated 3D model from ${{ github.event.inputs.image_path }}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
