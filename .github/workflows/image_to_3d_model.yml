name: Image to 3D Model Generation

on: 
  workflow_dispatch:
    inputs:
      image_path:
        description: 'Path to the input image file (e.g., images/my_model.png)'
        required: true
        type: string

jobs:
  generate-3d-model:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests # For potential API calls
          # Add any other dependencies for 3D generation AI or Blender scripting

      - name: Run AI-based 3D model generation
        id: generate_model
        run: |
          python /home/ubuntu/3d-model/scripts/generate_3d_model.py ${{ github.event.inputs.image_path }} /home/ubuntu/3d-model/output/generated_model.obj
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          # Add any other AI service API keys as secrets

      - name: Set up Blender
        # This step would typically involve installing Blender or using a Docker image with Blender pre-installed.
        # For simplicity, we'll assume Blender is available or will be installed in a custom runner.
        # A more robust solution would use a Docker container with Blender.
        run: |
          sudo apt-get update
          sudo apt-get install -y blender

      - name: Process 3D model in Blender
        run: |
          blender --background --python /home/ubuntu/3d-model/scripts/process_blender_model.py -- /home/ubuntu/3d-model/output/generated_model.obj /home/ubuntu/3d-model/output/final_model.glb

      - name: Commit and push 3D model
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add /home/ubuntu/3d-model/output/final_model.glb
          git commit -m "Add generated 3D model from ${{ github.event.inputs.image_path }}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
